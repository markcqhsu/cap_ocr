<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THC 生產OCR 辨識系統</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: #f0f2f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #1a3c6e;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    .version-badge {
      font-size: .7rem;
      background: rgba(255,255,255,.2);
      border-radius: 10px;
      padding: 2px 8px;
      letter-spacing: .5px;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    .card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .card h2 {
      font-size: .95rem;
      font-weight: 700;
      color: #1a3c6e;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .step-badge {
      background: #1a3c6e;
      color: #fff;
      border-radius: 50%;
      width: 22px; height: 22px;
      font-size: .75rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── Form type selector ── */
    .form-selector {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .form-btn {
      flex: 1;
      min-width: 180px;
      border: 2px solid #d0d8e8;
      border-radius: 10px;
      padding: 16px 20px;
      background: #fff;
      cursor: pointer;
      text-align: left;
      transition: border-color .2s, background .2s, box-shadow .2s;
    }
    .form-btn:hover {
      border-color: #4a6fa5;
      background: #f4f7ff;
    }
    .form-btn.active {
      border-color: #1a3c6e;
      background: #eef2ff;
      box-shadow: 0 0 0 3px rgba(26,60,110,.12);
    }
    .form-btn .product-tag {
      display: inline-block;
      font-size: .72rem;
      font-weight: 700;
      background: #1a3c6e;
      color: #fff;
      border-radius: 5px;
      padding: 2px 8px;
      margin-bottom: 8px;
    }
    .form-btn.active .product-tag { background: #1a3c6e; }
    .form-btn .form-name {
      font-size: .92rem;
      font-weight: 700;
      color: #1a3c6e;
      display: block;
    }
    .form-btn .form-desc {
      font-size: .78rem;
      color: #778;
      margin-top: 4px;
    }
    .coming-soon-badge {
      display: inline-block;
      font-size: .68rem;
      background: #f0a500;
      color: #fff;
      border-radius: 5px;
      padding: 1px 7px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ── Husky result ── */
    .husky-meta-strip {
      display: flex; flex-wrap: wrap; gap: 14px;
      background: #f5f7fa; border-radius: 8px;
      padding: 10px 14px; margin-bottom: 16px; font-size: .85rem;
    }
    .husky-meta-strip .meta-item input { width: 100px; }
    .husky-machine-row {
      display: flex; align-items: center; gap: 10px;
      background: #f5f7fa; border-radius: 8px;
      padding: 8px 14px; margin-bottom: 10px; font-size: .85rem;
      font-weight: 600;
    }
    .husky-machine-row label { margin-right: 4px; color: #444; font-weight: 400; }
    .husky-machine-row input[type=radio] { margin-right: 3px; accent-color: #1a3c6e; }

    .husky-tables {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      align-items: flex-start;
    }

    .husky-section-table {
      border-collapse: collapse;
      width: 100%;
      font-size: .8rem;
      table-layout: fixed;
    }
    .husky-section-table thead th:nth-child(1) { width: 10%; } /* 項目 */
    .husky-section-table thead th:nth-child(2) { width: 20%; } /* 名稱 */
    .husky-section-table thead th:nth-child(3) { width: 10%; } /* 設定值 */
    .husky-section-table thead th:nth-child(4) { width:  5%; } /* 範圍 */
    .husky-section-table thead th:nth-child(5) { width:  5%; } /* 單位 */
    .husky-section-table th {
      background: #1a3c6e; color: #fff;
      padding: 6px 5px; text-align: center;
      font-weight: 600; overflow: hidden;
    }
    .husky-section-table td {
      border: 1px solid #dde;
      padding: 2px 4px;
      vertical-align: middle;
      overflow: hidden;
    }
    .husky-section-table .td-group {
      background: #d9e4f0;
      font-weight: 700; font-size: .75rem;
      text-align: center;
    }
    .husky-section-table .td-pos {
      text-align: center; color: #667; font-size: .75rem; white-space: nowrap;
    }
    .husky-section-table .td-name {
      white-space: normal; word-break: break-word;
    }
    .husky-section-table .td-range,
    .husky-section-table .td-unit {
      text-align: center; color: #556;
    }
    .husky-section-table td input {
      border: none; outline: none; background: transparent;
      width: 100%; min-width: 44px;
      font-size: .8rem; text-align: center;
      font-family: inherit;
    }
    .husky-section-table td input:focus { background: #fffde7; }

    /* ── Upload zone ── */
    .upload-zone {
      border: 2px dashed #b0bac9;
      border-radius: 10px;
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: background .2s, border-color .2s;
      position: relative;
      overflow: hidden;
    }
    .upload-zone:not(.has-image):hover,
    .upload-zone.drag {
      background: #eef2ff;
      border-color: #4a6fa5;
    }
    .upload-zone.has-image {
      padding: 0;
      border-style: solid;
      border-color: #c8d4e8;
    }
    .upload-zone input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 2;
    }
    .upload-icon { color: #8899bb; margin-bottom: 10px; }
    .upload-zone p { color: #667; font-size: .9rem; }
    .upload-zone .hint { font-size: .78rem; color: #aaa; margin-top: 4px; }
    #preview-img {
      width: 100%; max-height: 420px;
      object-fit: contain;
      border-radius: 8px;
      display: none;
      vertical-align: top;
    }
    .upload-replace-overlay {
      display: none;
      position: absolute; inset: 0; z-index: 1;
      background: rgba(0,0,0,.45);
      color: #fff;
      font-size: 1rem; font-weight: 600;
      align-items: center; justify-content: center;
      gap: 8px;
      border-radius: 8px;
      pointer-events: none;
    }
    .upload-zone.has-image:hover .upload-replace-overlay {
      display: flex;
    }

    /* ── Progress ── */
    #progress-wrap {
      display: none;
      margin-top: 16px;
    }
    .progress-bar-track {
      background: #e8ecf2;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #1a3c6e, #4a90d9);
      border-radius: 99px;
      width: 0%;
      transition: width .4s ease;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0%   { filter: brightness(1); }
      50%  { filter: brightness(1.2); }
      100% { filter: brightness(1); }
    }
    .progress-steps {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      font-size: .78rem;
    }
    .progress-step {
      padding: 3px 10px;
      border-radius: 99px;
      background: #e8ecf2;
      color: #778;
      transition: background .3s, color .3s;
    }
    .progress-step.active { background: #1a3c6e; color: #fff; }
    .progress-step.done   { background: #1e7e3e; color: #fff; }

    /* ── Status ── */
    #status {
      font-size: .85rem;
      padding: 8px 12px;
      border-radius: 6px;
      display: none;
      margin-top: 10px;
    }
    #status.error { background: #fce8e8; color: #8b0000; display: block; }
    #status.ok    { background: #e8f5e9; color: #1e5c2e; display: block; }

    /* ── Buttons ── */
    .btn {
      padding: 9px 22px;
      border: none; border-radius: 7px;
      font-size: .9rem; font-weight: 600;
      cursor: pointer; transition: opacity .15s;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: #1a3c6e; color: #fff; }
    .btn-success { background: #1e7e3e; color: #fff; }
    .btn-outline { background: #fff; color: #1a3c6e; border: 1.5px solid #1a3c6e; }
    .btn-danger  { background: #fff; color: #b00; border: 1.5px solid #b00; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

    /* ── Meta strip ── */
    .meta-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      background: #f5f7fa;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
      font-size: .85rem;
    }
    .meta-item label { font-weight: 600; color: #556; margin-right: 4px; }
    .meta-item input {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 3px 8px;
      font-size: .85rem;
      width: 80px;
    }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: .82rem;
      min-width: 900px;
    }
    th {
      background: #1a3c6e; color: #fff;
      padding: 8px 6px;
      text-align: center;
      white-space: nowrap;
      font-weight: 600;
    }
    td {
      border: 1px solid #dde;
      padding: 3px 4px;
    }
    td input, td textarea {
      border: none; outline: none; background: transparent;
      width: 100%; min-width: 44px;
      font-size: .82rem; text-align: center;
      font-family: inherit;
    }
    td textarea {
      resize: none; overflow: hidden;
      line-height: 1.4; padding: 0;
      min-height: 1.4em;
    }
    tr:nth-child(even) td { background: #f8f9fc; }
    tr:hover td { background: #eef2ff; }
    td input:focus, td textarea:focus { background: #fffde7; }

    /* ── Footer fields ── */
    .footer-fields {
      display: flex; flex-wrap: wrap; gap: 16px;
      margin-top: 14px;
    }
    .footer-fields div label {
      font-size: .82rem; font-weight: 600; color: #556;
      display: block; margin-bottom: 3px;
    }
    .footer-fields input {
      border: 1px solid #ccc; border-radius: 6px;
      padding: 5px 10px; font-size: .85rem; width: 130px;
    }
  </style>
</head>
<body>

<header>
  <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/>
  </svg>
  <h1>THC 生產OCR 辨識系統</h1>
  <span class="version-badge">v1.3.4</span>
</header>

<div class="container">

  <!-- Step 1: 選擇表單類型 -->
  <div class="card">
    <h2><span class="step-badge">1</span>選擇表單類型</h2>
    <div class="form-selector">

      <button class="form-btn active" id="btn-form-cap" onclick="selectForm('cap')">
        <span class="product-tag">塑蓋</span>
        <span class="form-name">塑蓋廠不良率紀錄表</span>
        <span class="form-desc">各站別日產量、不良率、廢料記錄</span>
      </button>

      <button class="form-btn" id="btn-form-husky" onclick="selectForm('husky')">
        <span class="product-tag">瓶胚</span>
        <span class="form-name">Husky 製程管制標準</span>
        <span class="form-desc">EM04 / EM06 / EM07 注塑參數記錄</span>
      </button>

      <button class="form-btn" id="btn-form-hpp5" onclick="selectForm('hpp5')">
        <span class="product-tag">瓶胚</span>
        <span class="form-name">Hpp5 製程管制標準</span>
        <span class="form-desc">EM16 注塑參數記錄</span>
      </button>

      <button class="form-btn" id="btn-form-netstal" onclick="selectForm('netstal')">
        <span class="product-tag">瓶胚</span>
        <span class="form-name">Netstal 製程管制標準</span>
        <span class="form-desc">EM09 / EM13 注塑參數記錄</span>
      </button>

    </div>
  </div>

  <!-- Step 2: 上傳圖片 -->
  <div class="card">
    <h2><span class="step-badge">2</span>上傳表單圖片 &nbsp;<span id="form-type-label" style="font-weight:400;color:#556;font-size:.85rem;">塑蓋廠不良率紀錄表</span></h2>

    <div class="upload-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/*" onchange="onFileSelected(this)" />
      <div id="upload-hint">
        <div class="upload-icon">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
        </div>
        <p>點擊或拖曳圖片到此處</p>
        <p class="hint">支援 JPG、PNG、BMP</p>
      </div>
      <img id="preview-img" alt="預覽" />
      <div class="upload-replace-overlay">🔄 替換圖片</div>
    </div>

    <!-- Progress -->
    <div id="progress-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
      <div class="progress-steps">
        <span class="progress-step" id="ps-upload">上傳圖片</span>
        <span class="progress-step" id="ps-detect">文字偵測</span>
        <span class="progress-step" id="ps-recog">文字辨識</span>
        <span class="progress-step" id="ps-parse">欄位解析</span>
        <span class="progress-step" id="ps-done">完成</span>
      </div>
    </div>

    <div id="status"></div>

    <!-- 操作按鈕（所有表格共用） -->
    <div class="btn-row">
      <button class="btn btn-primary" id="btn-ocr" onclick="runOCR()" disabled>開始辨識</button>
      <button class="btn btn-danger"  id="btn-clear" onclick="clearAll()" disabled>清空</button>
    </div>
  </div>

  <!-- Step 3: 確認辨識結果（Husky 瓶胚） -->
  <div class="card" id="husky-result-card" style="display:none">
    <h2><span class="step-badge">3</span>確認辨識結果 &nbsp;<span id="preform-card-subtitle" style="font-weight:400;color:#556;font-size:.85rem;">Husky 製程管制標準</span></h2>

    <div class="husky-machine-row" id="husky-machine-row">
      機型：
      <label><input type="radio" name="h-機型" value="EM04"> EM04</label>
      <label><input type="radio" name="h-機型" value="EM06"> EM06</label>
      <label><input type="radio" name="h-機型" value="EM07"> EM07</label>
    </div>
    <div class="husky-meta-strip">
      <div class="meta-item"><label>日期</label><input type="text" id="h-日期" /></div>
      <div class="meta-item"><label>克重</label><input type="text" id="h-克重" /></div>
      <div class="meta-item"><label>瓶口</label><input type="text" id="h-瓶口" /></div>
      <div class="meta-item"><label>模號</label><input type="text" id="h-模號" /></div>
      <div class="meta-item"><label>穴數</label><input type="text" id="h-穴數" style="width:60px" /></div>
      <div class="meta-item"><label>原料</label><input type="text" id="h-原料" /></div>
    </div>

    <div class="husky-tables">
      <div class="table-wrap">
        <table class="husky-section-table">
          <thead><tr><th>項目</th><th>名稱</th><th>設定值</th><th>範圍</th><th>單位</th></tr></thead>
          <tbody id="husky-left-body"></tbody>
        </table>
      </div>
      <div class="table-wrap">
        <table class="husky-section-table">
          <thead><tr><th>項目</th><th>名稱</th><th>設定值</th><th>範圍</th><th>單位</th></tr></thead>
          <tbody id="husky-right-body"></tbody>
        </table>
      </div>
    </div>

    <div class="btn-row" style="margin-top:16px">
      <button class="btn btn-success" onclick="exportHusky()">⬇ 匯出 Excel</button>
      <button class="btn btn-outline" onclick="downloadHuskyTemplate()">⬇ 下載空白表格（確認用）</button>
    </div>
  </div>

  <!-- Step 3: 確認辨識結果（塑蓋） -->
  <div class="card" id="result-card" style="display:none">
    <h2><span class="step-badge">3</span>確認辨識結果 &nbsp;<span style="font-weight:400;color:#556;font-size:.85rem;">塑蓋廠不良率紀錄表</span></h2>

    <div class="meta-strip">
      <div class="meta-item"><label>製程</label><input type="text" id="inp-process" /></div>
      <div class="meta-item"><label>組別</label><input type="text" id="inp-group" /></div>
      <div class="meta-item"><label>班別</label><input type="text" id="inp-shift" /></div>
      <div class="meta-item"><label>年份</label><input type="text" id="inp-year" /></div>
    </div>

    <div class="table-wrap">
      <table id="result-table">
        <thead>
          <tr>
            <th>日期</th><th>機台編號</th><th>工單號碼</th><th>品名、蓋型</th>
            <th>產量(個)</th><th>不良數(個)</th><th>不良率(%)</th>
            <th>有無添加回收料</th><th>廢蓋(KG)</th><th>廢料(KG)</th>
            <th>可回收廢蓋(KG)</th><th>不良原因</th>
          </tr>
        </thead>
        <tbody id="result-body"></tbody>
      </table>
    </div>

    <div class="footer-fields">
      <div><label>廠長</label><input type="text" id="inp-manager" /></div>
      <div><label>副廠</label><input type="text" id="inp-deputy" /></div>
      <div><label>填表人</label><input type="text" id="inp-writer" /></div>
    </div>

    <div class="btn-row">
      <button class="btn btn-success" onclick="exportExcel()">⬇ 匯出 Excel</button>
      <button class="btn btn-outline" onclick="addRow()">＋ 新增一行</button>
    </div>
  </div>

</div>

<script>
  const API = (location.hostname === "localhost" || location.hostname === "127.0.0.1")
    ? "http://localhost:8080"
    : "https://cap-ocr-api-65578120182.asia-east1.run.app";

  const ROW_KEYS = [
    "日期","機台編號","工單號碼","品名蓋型",
    "產量","不良數","不良率","有無添加回收料",
    "廢蓋KG","廢料KG","可回收廢蓋KG","不良原因",
  ];

  let currentForm = "cap";

  // ── Form registry — add new form types here only ──────────────────────────
  const FORM_CONFIG = {
    cap:     { label: "塑蓋廠不良率紀錄表",    isPreform: false, machines: []                   },
    husky:   { label: "Husky 製程管制標準",    isPreform: true,  machines: ["EM04","EM06","EM07"] },
    hpp5:    { label: "Hpp5 製程管制標準",     isPreform: true,  machines: []                   },
    netstal: { label: "Netstal 製程管制標準",  isPreform: true,  machines: ["EM09","EM13"]       },
  };

  function selectForm(type) {
    currentForm = type;
    const cfg = FORM_CONFIG[type];
    // Update selector buttons
    Object.keys(FORM_CONFIG).forEach(t => {
      const btn = document.getElementById(`btn-form-${t}`);
      if (btn) btn.classList.toggle("active", t === type);
    });
    document.getElementById("form-type-label").textContent = cfg.label;
    // Machine type row: show and rebuild if form has machine options
    const machineRow = document.getElementById("husky-machine-row");
    const machines = cfg.machines || [];
    machineRow.style.display = machines.length ? "" : "none";
    if (machines.length) {
      machineRow.innerHTML = "機型：" + machines.map(m =>
        `<label><input type="radio" name="h-機型" value="${m}"> ${m}</label>`
      ).join("");
    }
    // Preform result card subtitle
    if (cfg.isPreform) {
      document.getElementById("preform-card-subtitle").textContent = cfg.label;
    }
    clearAll(true);
  }

  // ── Drag & drop ───────────────────────────────────────────────────────────
  const dropZone = document.getElementById("drop-zone");
  dropZone.addEventListener("dragover",  e => { e.preventDefault(); dropZone.classList.add("drag"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault(); dropZone.classList.remove("drag");
    if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
  });

  let selectedFile = null;

  function onFileSelected(input) { if (input.files[0]) setFile(input.files[0]); }

  function setFile(file) {
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = e => {
      const img = document.getElementById("preview-img");
      img.src = e.target.result;
      img.style.display = "block";
      document.getElementById("drop-zone").classList.add("has-image");
      document.getElementById("upload-hint").style.display = "none";
    };
    reader.readAsDataURL(file);
    document.getElementById("btn-ocr").disabled   = false;
    document.getElementById("btn-clear").disabled = false;
    setStatus("", "");
    hideProgress();
  }

  function clearAll(silent = false) {
    selectedFile = null;
    document.getElementById("file-input").value = "";
    const img = document.getElementById("preview-img");
    img.src = ""; img.style.display = "none";
    document.getElementById("drop-zone").classList.remove("has-image");
    document.getElementById("upload-hint").style.display = "";
    document.getElementById("btn-ocr").disabled   = true;
    document.getElementById("btn-clear").disabled = true;
    if (!silent) {
      document.getElementById("result-card").style.display       = "none";
      document.getElementById("husky-result-card").style.display = "none";
    }
    hideProgress();
    setStatus("", "");
  }

  // ── Progress ──────────────────────────────────────────────────────────────
  const STEPS = ["ps-upload", "ps-detect", "ps-recog", "ps-parse", "ps-done"];
  const PCTS  = [10, 35, 65, 88, 100];

  function showProgress() {
    document.getElementById("progress-wrap").style.display = "block";
    STEPS.forEach(id => {
      const el = document.getElementById(id);
      el.classList.remove("active", "done");
    });
    setProgressBar(0);
  }

  function hideProgress() {
    document.getElementById("progress-wrap").style.display = "none";
  }

  function setProgressStep(stepIdx) {
    STEPS.forEach((id, i) => {
      const el = document.getElementById(id);
      el.classList.remove("active", "done");
      if (i < stepIdx)  el.classList.add("done");
      if (i === stepIdx) el.classList.add("active");
    });
    setProgressBar(PCTS[stepIdx] ?? 100);
  }

  function setProgressBar(pct) {
    document.getElementById("progress-bar").style.width = pct + "%";
  }

  // ── OCR ───────────────────────────────────────────────────────────────────
  async function runOCR() {
    if (!selectedFile) return;

    document.getElementById("btn-ocr").disabled = true;
    document.getElementById("result-card").style.display       = "none";
    document.getElementById("husky-result-card").style.display = "none";
    setStatus("", "");
    showProgress();
    setProgressStep(0);

    const form = new FormData();
    form.append("image", selectedFile);
    form.append("form_type", currentForm);

    let stepTimer = 1;
    const ticker = setInterval(() => {
      if (stepTimer < STEPS.length - 1) {
        setProgressStep(stepTimer);
        stepTimer++;
      }
    }, 3500);

    try {
      const res = await fetch(`${API}/ocr`, { method: "POST", body: form });
      clearInterval(ticker);
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(`HTTP ${res.status}：${txt.slice(0, 120)}`);
      }
      const data = await res.json();
      setProgressStep(4);
      setTimeout(() => {
        hideProgress();
        if (FORM_CONFIG[currentForm].isPreform) fillHusky(data);
        else                                    fillResults(data);
        setStatus("辨識完成，請確認資料後匯出。", "ok");
      }, 600);
    } catch (err) {
      clearInterval(ticker);
      hideProgress();
      setStatus("辨識失敗：" + err.message, "error");
    } finally {
      document.getElementById("btn-ocr").disabled = false;
    }
  }

  function fillResults(data) {
    document.getElementById("inp-process").value = data.製程  || "";
    document.getElementById("inp-group").value   = data.組別  || "";
    document.getElementById("inp-shift").value   = data.班別  || "";
    document.getElementById("inp-year").value    = data.年份  || "";
    document.getElementById("inp-manager").value = data.廠長  || "";
    document.getElementById("inp-deputy").value  = data.副廠  || "";
    document.getElementById("inp-writer").value  = data.填表人 || "";

    const tbody = document.getElementById("result-body");
    tbody.innerHTML = "";
    (data.rows || []).forEach(row => appendRow(row));

    document.getElementById("result-card").style.display = "block";
    document.getElementById("result-card").scrollIntoView({ behavior: "smooth" });
  }

  // ── Husky fill & export ───────────────────────────────────────────────────
  const RIGHT_GROUPS_BY_FORM = {
    husky:   new Set(["機器加熱設定","模具加熱設定","控制","乾燥機"]),
    hpp5:    new Set(["機器加熱設定","模具加熱設定"]),
    netstal: new Set(["機器加熱設定","模具加熱設定","乾燥機","料桶"]),
  };
  function getRightGroups() {
    return RIGHT_GROUPS_BY_FORM[currentForm] || new Set();
  }

  function _getHuskyMachine() {
    const checked = document.querySelector('input[name="h-機型"]:checked');
    return checked ? checked.value : "";
  }

  function fillHusky(data) {
    currentHuskyData = data;
    // Set machine type radio
    const mt = data["機型"] || "EM04";
    const radio = document.querySelector(`input[name="h-機型"][value="${mt}"]`);
    if (radio) radio.checked = true;
    // Fill other meta fields
    ["日期","克重","瓶口","模號","穴數","原料"].forEach(k => {
      const el = document.getElementById("h-" + k);
      if (el) el.value = data[k] || "";
    });

    const params = data.params || [];
    const rightSet    = getRightGroups();
    const leftParams  = params.filter(p => !rightSet.has(p.group));
    const rightParams = params.filter(p =>  rightSet.has(p.group));

    _buildHuskyTable("husky-left-body",  leftParams);
    _buildHuskyTable("husky-right-body", rightParams);

    document.getElementById("husky-result-card").style.display = "block";
    document.getElementById("husky-result-card").scrollIntoView({ behavior: "smooth" });
  }

  function _buildHuskyTable(tbodyId, params) {
    const tbody = document.getElementById(tbodyId);
    tbody.innerHTML = "";
    const hasPos = params.some(p => p.pos);
    // Update thead if needed
    const thead = tbody.closest("table").querySelector("thead tr");
    if (hasPos && thead.children.length === 5) {
      const th = document.createElement("th");
      th.textContent = "位置";
      thead.insertBefore(th, thead.children[1]);
    } else if (!hasPos && thead.children.length === 6) {
      thead.children[1].remove();
    }

    params.forEach((p, i) => {
      const tr = document.createElement("tr");

      const tdGrp = document.createElement("td");
      tdGrp.className = "td-group";
      tdGrp.dataset.group = p.group;
      tr.appendChild(tdGrp);

      if (hasPos) {
        const tdPos = document.createElement("td");
        tdPos.className = "td-pos";
        tdPos.textContent = p.pos || "";
        tr.appendChild(tdPos);
      }

      const tdName = document.createElement("td");
      tdName.className = "td-name";
      tdName.textContent = p.name;
      tr.appendChild(tdName);

      const tdVal = document.createElement("td");
      const inp = document.createElement("input");
      inp.type = "text"; inp.value = p.value || "";
      inp.dataset.name = p.name;
      tdVal.appendChild(inp);
      tr.appendChild(tdVal);

      const tdRng = document.createElement("td");
      tdRng.className = "td-range";
      tdRng.textContent = p.range;
      tr.appendChild(tdRng);

      const tdUnit = document.createElement("td");
      tdUnit.className = "td-unit";
      tdUnit.textContent = p.unit;
      tr.appendChild(tdUnit);

      tbody.appendChild(tr);
    });

    // Merge group cells
    const rows = [...tbody.querySelectorAll("tr")];
    let i = 0;
    while (i < rows.length) {
      const grp = rows[i].querySelector(".td-group").dataset.group;
      let j = i + 1;
      while (j < rows.length && rows[j].querySelector(".td-group").dataset.group === grp) j++;
      const span = j - i;
      const cell = rows[i].querySelector(".td-group");
      cell.textContent = grp;
      cell.rowSpan = span;
      for (let k = i + 1; k < j; k++) {
        rows[k].querySelector(".td-group").remove();
      }
      i = j;
    }
  }

  async function exportHusky() {
    const params = [];
    document.querySelectorAll("#husky-left-body input, #husky-right-body input").forEach(inp => {
      params.push({ name: inp.dataset.name, value: inp.value });
    });

    const allParams = (currentHuskyData?.params || []).map(p => ({
      ...p,
      value: params.find(x => x.name === p.name)?.value ?? p.value,
    }));

    const payload = {
      form_type: currentForm,
      日期: document.getElementById("h-日期").value,
      克重: document.getElementById("h-克重").value,
      瓶口: document.getElementById("h-瓶口").value,
      模號: document.getElementById("h-模號").value,
      穴數: document.getElementById("h-穴數").value,
      原料: document.getElementById("h-原料").value,
      params: allParams,
    };
    payload["機型"] = _getHuskyMachine();

    setStatus("匯出中…", "ok");
    try {
      const res = await fetch(`${API}/export`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href = url;
      const EXPORT_NAMES = {
        husky:   "Husky_製程管制標準.xlsx",
        hpp5:    "Hpp5_製程管制標準.xlsx",
        netstal: "Netstal_製程管制標準.xlsx",
      };
      a.download = EXPORT_NAMES[currentForm] || `${currentForm}_製程管制標準.xlsx`;
      a.click();
      URL.revokeObjectURL(url);
      setStatus("匯出成功！", "ok");
    } catch (err) {
      setStatus("匯出失敗：" + err.message, "error");
    }
  }

  function downloadHuskyTemplate() {
    const mt = _getHuskyMachine();
    const url = mt
      ? `${API}/template?type=${currentForm}&machine=${mt}`
      : `${API}/template?type=${currentForm}`;
    window.open(url, "_blank");
  }

  let currentHuskyData = null;

  const WRAP_COLS = new Set(["品名蓋型", "不良原因"]);

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
  }

  function appendRow(row = {}) {
    const tr = document.createElement("tr");
    ROW_KEYS.forEach(key => {
      const td = document.createElement("td");
      let el;
      if (WRAP_COLS.has(key)) {
        el = document.createElement("textarea");
        el.rows = 1;
        el.value = row[key] || "";
        el.addEventListener("input", () => autoResize(el));
        setTimeout(() => autoResize(el), 0);
      } else {
        el = document.createElement("input");
        el.type = "text";
        el.value = row[key] || "";
      }
      td.appendChild(el);
      tr.appendChild(td);
    });
    document.getElementById("result-body").appendChild(tr);
  }

  function addRow() { appendRow(); }

  // ── Export ────────────────────────────────────────────────────────────────
  async function exportExcel() {
    const rows = [];
    document.querySelectorAll("#result-body tr").forEach(tr => {
      const vals = [...tr.querySelectorAll("input, textarea")].map(i => i.value);
      const row = {};
      ROW_KEYS.forEach((k, i) => { row[k] = vals[i] || ""; });
      rows.push(row);
    });

    const payload = {
      製程:  document.getElementById("inp-process").value,
      組別:  document.getElementById("inp-group").value,
      班別:  document.getElementById("inp-shift").value,
      年份:  document.getElementById("inp-year").value,
      廠長:  document.getElementById("inp-manager").value,
      副廠:  document.getElementById("inp-deputy").value,
      填表人: document.getElementById("inp-writer").value,
      rows,
    };

    setStatus("匯出中…", "ok");
    try {
      const res = await fetch(`${API}/export`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href = url;
      a.download = `${payload.製程 || "不良率"}_紀錄表.xlsx`;
      a.click();
      URL.revokeObjectURL(url);
      setStatus("匯出成功！", "ok");
    } catch (err) {
      setStatus("匯出失敗：" + err.message, "error");
    }
  }

  function setStatus(msg, type) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = type || "";
    el.style.display = msg ? "block" : "none";
  }
</script>
